<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#e8f5ee"/>

  <!-- Soft backdrop circle -->
  <circle cx="200" cy="155" r="115" fill="#c8e8d4" opacity="0.5"/>

  <!-- Large paw print - palm -->
  <ellipse cx="200" cy="175" rx="55" ry="50" fill="#2c7a4b" opacity="0.18"/>

  <!-- Paw print - toe pads -->
  <circle cx="163" cy="130" r="22" fill="#2c7a4b" opacity="0.16"/>
  <circle cx="200" cy="118" r="24" fill="#2c7a4b" opacity="0.16"/>
  <circle cx="237" cy="130" r="22" fill="#2c7a4b" opacity="0.16"/>
  <circle cx="148" cy="158" r="19" fill="#2c7a4b" opacity="0.14"/>
  <circle cx="252" cy="158" r="19" fill="#2c7a4b" opacity="0.14"/>

  <!-- Inner paw (solid, centred) -->
  <ellipse cx="200" cy="175" rx="40" ry="36" fill="#2c7a4b" opacity="0.28"/>
  <circle cx="168" cy="138" r="16" fill="#2c7a4b" opacity="0.28"/>
  <circle cx="200" cy="126" r="17" fill="#2c7a4b" opacity="0.28"/>
  <circle cx="232" cy="138" r="16" fill="#2c7a4b" opacity="0.28"/>

  <!-- Question mark — friendly "no photo" indicator -->
  <text x="200" y="188" text-anchor="middle" font-family="Nunito, sans-serif" font-size="52" font-weight="900" fill="#fff" opacity="0.85">?</text>

  <!-- Surrounding small hearts / stars -->
  <text x="95" y="115" font-family="sans-serif" font-size="22" fill="#f0a500" opacity="0.4">♥</text>
  <text x="290" y="105" font-family="sans-serif" font-size="20" fill="#f0a500" opacity="0.4">★</text>
  <text x="80" y="210" font-family="sans-serif" font-size="18" fill="#2c7a4b" opacity="0.3">★</text>
  <text x="305" y="215" font-family="sans-serif" font-size="22" fill="#f0a500" opacity="0.35">♥</text>

  <!-- Small paw prints around bottom -->
  <circle cx="120" cy="258" r="7" fill="#2c7a4b" opacity="0.2"/>
  <circle cx="138" cy="248" r="5" fill="#2c7a4b" opacity="0.2"/>
  <circle cx="154" cy="258" r="5" fill="#2c7a4b" opacity="0.2"/>

  <circle cx="246" cy="258" r="7" fill="#2c7a4b" opacity="0.2"/>
  <circle cx="264" cy="248" r="5" fill="#2c7a4b" opacity="0.2"/>
  <circle cx="280" cy="258" r="5" fill="#2c7a4b" opacity="0.2"/>

  <!-- Label -->
  <text x="200" y="292" text-anchor="middle" font-family="Nunito, sans-serif" font-size="13" font-weight="700" fill="#2c7a4b" opacity="0.7">No photo yet</text>
</svg>
