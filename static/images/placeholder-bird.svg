<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" fill="#e8f5ee"/>

  <!-- Soft backdrop circle -->
  <circle cx="200" cy="155" r="115" fill="#c8e8d4" opacity="0.5"/>

  <!-- Branch / perch -->
  <rect x="100" y="230" width="200" height="14" rx="7" fill="#8b6030"/>
  <rect x="85" y="235" width="230" height="6" rx="3" fill="#a07040" opacity="0.5"/>

  <!-- Tail feathers -->
  <ellipse cx="248" cy="215" rx="28" ry="11" fill="#2060c0" transform="rotate(30 248 215)"/>
  <ellipse cx="255" cy="222" rx="26" ry="10" fill="#3070d0" transform="rotate(20 255 222)"/>
  <ellipse cx="260" cy="230" rx="24" ry="9" fill="#4080e0" transform="rotate(10 260 230)"/>

  <!-- Body -->
  <ellipse cx="200" cy="185" rx="55" ry="50" fill="#40a0e8"/>

  <!-- Wing left -->
  <ellipse cx="158" cy="185" rx="28" ry="40" fill="#2880c8" transform="rotate(-10 158 185)"/>

  <!-- Wing right (slightly raised) -->
  <ellipse cx="242" cy="178" rx="28" ry="38" fill="#2880c8" transform="rotate(15 242 178)"/>

  <!-- Chest / belly -->
  <ellipse cx="200" cy="200" rx="30" ry="32" fill="#f0e068"/>

  <!-- Head -->
  <circle cx="200" cy="130" r="38" fill="#40a0e8"/>

  <!-- Cheek patches -->
  <circle cx="183" cy="138" r="10" fill="#f08030" opacity="0.6"/>
  <circle cx="217" cy="138" r="10" fill="#f08030" opacity="0.6"/>

  <!-- Beak -->
  <polygon points="200,135 190,143 210,143" fill="#f0c030"/>
  <polygon points="200,143 190,143 210,143" fill="#c09020"/>

  <!-- Left eye -->
  <circle cx="184" cy="120" r="9" fill="#fff"/>
  <circle cx="184" cy="120" r="6" fill="#1a1a1a"/>
  <circle cx="186" cy="118" r="2" fill="#fff"/>

  <!-- Right eye -->
  <circle cx="216" cy="120" r="9" fill="#fff"/>
  <circle cx="216" cy="120" r="6" fill="#1a1a1a"/>
  <circle cx="218" cy="118" r="2" fill="#fff"/>

  <!-- Head crest / tuft -->
  <ellipse cx="200" cy="97" rx="8" ry="18" fill="#2060c0" transform="rotate(-5 200 97)"/>
  <ellipse cx="193" cy="100" rx="6" ry="14" fill="#3070d0" transform="rotate(-15 193 100)"/>
  <ellipse cx="207" cy="100" rx="6" ry="14" fill="#3070d0" transform="rotate(15 207 100)"/>

  <!-- Feet / claws -->
  <line x1="180" y1="232" x2="165" y2="244" stroke="#c08030" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="244" x2="162" y2="244" stroke="#c08030" stroke-width="3" stroke-linecap="round"/>
  <line x1="180" y1="244" x2="165" y2="252" stroke="#c08030" stroke-width="3" stroke-linecap="round"/>

  <line x1="220" y1="232" x2="235" y2="244" stroke="#c08030" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="244" x2="238" y2="244" stroke="#c08030" stroke-width="3" stroke-linecap="round"/>
  <line x1="220" y1="244" x2="235" y2="252" stroke="#c08030" stroke-width="3" stroke-linecap="round"/>

  <!-- Decorative sparkles -->
  <circle cx="80" cy="70" r="4" fill="#f0a500" opacity="0.3"/>
  <circle cx="320" cy="65" r="5" fill="#f0a500" opacity="0.3"/>
  <circle cx="60" cy="200" r="3" fill="#40a0e8" opacity="0.3"/>

  <!-- Label -->
  <text x="200" y="292" text-anchor="middle" font-family="Nunito, sans-serif" font-size="13" font-weight="700" fill="#2c7a4b" opacity="0.7">No photo yet</text>
</svg>
